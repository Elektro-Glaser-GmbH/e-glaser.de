project:
  type: website
  output-dir: _site
  resources:
    - assets/img/

website:
  title: "Elektro-Glaser"
  description: "Ihr Partner für Erneuerbare Energien, Smart Home und Elektromobilität in Erlangen"
  site-url: "https://elektro-glaser-gmbh.github.io/e-glaser.de"
  favicon: "assets/favicon.ico"

  navbar:
    logo: "assets/logo.svg"
    logo-alt: "Elektro-Glaser Logo"
    title: false
    left:
      - text: "Startseite"
        href: index.qmd
      - text: "Über uns"
        href: about.qmd
      - text: "Dienstleistungen"
        href: services.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "Kontakt"
        href: contact.qmd
    right:
      - icon: envelope
        href: "mailto:info@e-glaser.de"
        aria-label: E-Mail

  page-footer:
    left: "© 2025 Elektro-Glaser GmbH · Erlangen"
    right:
      - text: "Impressum"
        href: impressum.qmd
      - text: "Datenschutz"
        href: datenschutz.qmd

  open-graph:
    locale: de_DE
    site-name: "Elektro-Glaser"

format:
  html:
    theme:
      light: [flatly, custom.scss]
    css: custom.scss
    toc: false
    lang: de
    link-external-newwindow: true
    smooth-scroll: true
    include-in-header:
      text: |
        <meta name="author" content="Elektro-Glaser GmbH">

execute:
  freeze: auto
